name: Build PR

on:
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build (Linux only, no publish)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Nuxt SPA + Nitro
        env:
          ELECTRON: 'true'
        run: npx nuxt build

      - name: Compile Electron main process
        run: npx tsc -p electron/tsconfig.json

      - name: Package without publishing
        run: npx electron-builder --linux --publish never
